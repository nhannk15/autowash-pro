services:
  mysql:
    image: mariadb:10.11
    container_name: autowash-db
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: 123456
      MARIADB_DATABASE: autowash
      MARIADB_USER: autowash
      MARIADB_PASSWORD: autowash123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      start_period: 30s
      interval: 10s
      retries: 5
    networks:
      - autowash-net

  backend:
    build:
      context: ./backend
    container_name: autowash-backend
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/autowash?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: autowash
      SPRING_DATASOURCE_PASSWORD: autowash123
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - autowash-net

  frontend:
    build:
      context: ./frontend
    container_name: autowash-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - autowash-net

volumes:
  mysql_data:

networks:
  autowash-net:
    driver: bridge
